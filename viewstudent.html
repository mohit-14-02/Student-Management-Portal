<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Students</title>
    <style>
        body{
            margin:0;
            padding:0;
            background-color:burlywood;
            font-family: Arial, Helvetica, sans-serif;
        }

        nav{
            width:100%;
            background-color:cornsilk;
            padding: 20px 15px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        nav a{
            text-decoration:none;
            color:brown;
            font-weight:600;
            margin:15px;
            border-radius:50px;
            padding:10px 16px;
            display:inline-block;
            transition: background-color .2s ease, transform .08s ease;
        }

        nav a:hover{
            background-color:bisque;
            transform: translateY(-1px);
        }

        .wrap{
            width: min(980px, calc(100% - 32px));
            margin: 60px auto 0 auto;
            background-color: blanchedalmond;
            border: 3px solid goldenrod;
            border-radius: 20px;
            padding: 28px 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .wrap h1{
            margin:0 0 16px;
            color:#7a3f00;
            text-align:center;
        }

        table{
            width:100%;
            border-collapse: collapse;
            overflow:hidden;
            border-radius: 12px;
        }

        thead th{
            background:#0b3d91; /* dark blue header */
            color:#fff;
            padding:12px 10px;
            text-align:left;
            font-weight:800;
            letter-spacing:0.2px;
        }

        tbody td{
            padding:12px 10px;
            border-top: 1px solid rgba(0,0,0,0.08);
        }

        /* zebra striping */
        tbody tr:nth-child(odd){
            background:#7fb3ff; /* lighter blue */
        }
        tbody tr:nth-child(even){
            background:#3f85ff; /* blue */
        }

        tbody tr:hover{
            filter: brightness(1.03);
        }

        .actions{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .Edit-btn{
            background-color: darkgoldenrod;
            color:#fff;
            border:none;
            border-radius:999px;
            padding:8px 14px;
            font-weight:800;
            cursor:pointer;
            transition: background-color .2s ease, transform .08s ease;
        }

        .Edit-btn:hover{
            background-color:bisque;
            color:#7a3f00;
            transform: translateY(-1px);
        }

        .delete-btn{
            background-color:#b91c1c;
            color:#fff;
            border:none;
            border-radius:999px;
            padding:8px 14px;
            font-weight:800;
            cursor:pointer;
            transition: background-color .2s ease, transform .08s ease;
        }

        .delete-btn:hover{
            background-color:#ef4444;
            transform: translateY(-1px);
        }

        @media (max-width: 720px){
            thead th{ font-size: 13px; }
            tbody td{ font-size: 13px; }
        }
    </style>
</head>
<body>
    <nav>
        <center>
            <a href = "dashboard.html">Dashboard</a>
            <a href = "editstudent.html">Edit Students</a>
            <a href = "logout.html">Logout</a>
        </center>
    </nav>

    <div class="wrap">
        <h1>Student Details</h1>
        <table>
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Student Name</th>
                    <th>Grade</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>

                    <td>
                        <div class="actions">
                            <a href="editstudent.html"><button type="button" class="Edit-btn">Edit</button></a>
                            <button class="delete-btn">Delete</button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Sathwik</td>
                    <td>8.84</td>
                    <td>
                        <div class="actions">
                            <a href="editstudent.html"><button type="button" class="Edit-btn">Edit</button></a>
                            <button class="delete-btn">Delete</button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Sudarshan</td>
                    <td>8.4</td>
                    <td>
                        <div class="actions">
                            <a href="editstudent.html"><button type="button" class="Edit-btn">Edit</button></a>
                            <button class="delete-btn">Delete</button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>4</td>
                    <td>Pavan</td>
                    <td>9.13</td>
                    <td>
                        <div class="actions">
                            <a href="editstudent.html"><button type="button" class="Edit-btn">Edit</button></a>
                            <button class="delete-btn">Delete</button>

                    </td>
                </tr>
                <tr>
                    <td>5</td>

                        <div class="actions">
                            <a href="editstudent.html"><button type="button" class="Edit-btn">Edit</button></a>
                            <button class="delete-btn">Delete</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
