<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBoard</title>
    <style>
        body{
            margin:0;
            padding:0;
            background-color:burlywood;
            font-family: Arial, Helvetica, sans-serif;
        }

        nav{
            width:100%;
            background-color:cornsilk;
            padding: 20px 15px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        nav a{
            text-decoration:none;
            color:brown;
            font-weight:600;
            margin:15px;
            border-radius:50px;
            padding:10px 16px;
            display:inline-block;
            transition: background-color .2s ease, transform .08s ease;
        }

        nav a:hover{
            background-color:bisque;
            transform: translateY(-1px);
        }

        .wrap{
            width: min(900px, calc(100% - 32px));
            margin: 60px auto 0 auto;
            background-color: blanchedalmond;
            border: 3px solid goldenrod;
            border-radius: 20px;
            padding: 28px 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align:center;
        }

        .wrap h1{
            margin:0;
            color:#7a3f00;
            font-size: 24px;
        }

        @media (max-width: 480px){
            .wrap{ margin-top: 30px; padding: 22px 16px; }
            .wrap h1{ font-size: 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <center>
            <a href="addstudent.html">Add Students</a>
            <a href="editstudent.html">Edit Students</a>
            <a href="viewstudent.html">View Students</a>
            <a href="logout.html">Logout</a>
            
        </center>
    </nav>

    <div class="wrap">
        <h1>Welcome To Student Management Portal Dashboard</h1>
    </div>
</body>
</html>
