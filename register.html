<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body{
            margin:0;
            padding:0;
            background-color:burlywood;
            font-family: Arial, Helvetica, sans-serif;
        }

        nav{
            width:100%;
            background-color:cornsilk;
            font-size: large;
            font-weight: 500;
            padding: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        nav a{
            text-decoration:none;
            color:brown;
            font-weight:600;
            margin:15px;
            border-radius:50px;
            padding:10px 16px;
            display:inline-block;
            transition: background-color .2s ease, transform .08s ease;
        }

        nav a:hover{
            background-color:bisque;
            transform: translateY(-1px);
        }

        form{
            display:flex;
            justify-content:center;
        }

        .card{
            width: 440px; /* reduced */
            max-width: calc(100% - 32px);
            background-color: blanchedalmond;
            border: 3px solid goldenrod;
            border-radius: 20px;
            padding: 22px 18px;
            margin: 70px auto 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }


        .card h1{
            margin:0 0 14px;
            text-align:center;
            color:#7a3f00;
        }

        .field{
            margin-top: 14px;
        }

        .field label{
            display:block;
            font-weight:700;
            color:#6b2f00;
            margin-bottom:6px;
        }

        *{ box-sizing:border-box; }

        .card input{
            width:100%;
            padding: 12px 14px;
            border-radius: 999px;
            border: 1.5px solid rgba(0,0,0,0.15);
            outline:none;
            font-size:15px;
            background:#fff;
            transition: border-color .2s ease, box-shadow .2s ease;
        }

        .card input:focus{
            border-color:#d49a2a;
            box-shadow:0 0 0 4px rgba(212,154,42,0.2);
        }

        .actions{
            margin-top: 18px;
            display:flex;
            justify-content:center;
        }

        .card button{
            width: 100%;
            padding: 12px 16px;
            border-radius: 999px;
            border: none;
            background-color: darkgoldenrod;
            color: #fff;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: background-color .2s ease, transform .08s ease;
        }

        .card button:hover{
            background-color: bisque;
            color:#7a3f00;
            transform: translateY(-1px);
        }

        .card hr{
            margin: 18px 0;
            border:0;
            border-top:1px solid rgba(0,0,0,0.15);
        }

        .card .link{
            display:block;
            text-align:center;
            color:#7a3f00;
            text-decoration:none;
            font-weight:700;
        }

        .card .link:hover{
            text-decoration: underline;
        }

        @media (max-width: 480px){
            .card{ margin-top: 30px; padding: 22px 16px; }
        }
    </style>
</head>
<body>
    <nav>
        <center>
            <a href = "index.html">Home</a>
            <a href = "login.html">Login</a>
            <a href = "register.html">Register</a>
        </center>
    </nav>

    <form action="dashboard.html" onsubmit="return true" method="post">
        <div class="card">
            <h1>Register</h1>

            <div class="field">
                <label for="Username"><b>Username</b></label>
                <input type="text" id="Username" placeholder="Enter Username" name="username" required />
            </div>

            <div class="field">
                <label for="email"><b>Email</b></label>
                <input type="email" id="email" placeholder="Enter Email" name="email" required />
            </div>

            <div class="field">
                <label for="Password"><b>Password</b></label>
                <input type="password" id="Password" placeholder="Enter Password" name="password" required />
            </div>

            <div class="field">
                <label for="cpass"><b>Confirm Password</b></label>
                <input type="password" id="cpass" placeholder="Confirm Password" name="confirmpass" required />
            </div>

            <div class="actions">
                <button type="submit">Register</button>
            </div>

            <hr />
            <a class="link" href="login.html">Already have an account?</a>
        </div>
    </form>
</body>
</html>
